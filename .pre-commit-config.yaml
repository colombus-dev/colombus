repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.4.4
  hooks:
  - id: ruff
    args: [--fix, --select, "I"]
  - id: ruff-format

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.10.0
  hooks:
  - id: mypy
    additional_dependencies:
    - fastapi
    - pydantic
    - types-ujson
    - sqlmodel

- repo: https://github.com/hadolint/hadolint
  rev: v2.12.0
  hooks:
  - id: hadolint-docker
    args: [--failure-threshold, error]

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.6.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-toml
  - id: check-merge-conflict
  - id: check-added-large-files
    args: [--maxkb=1000]
  - id: debug-statements

- repo: local
  hooks:
  - id: typescript-check
    name: TypeScript type check (UI)
    entry: bash -c 'cd ui && ([ -d node_modules ] || yarn install --frozen-lockfile --ignore-engines) && yarn tsc -b'
    language: system
    files: ^ui/.*\.(ts|tsx)$
    pass_filenames: false
  - id: biome-lint
    name: Biome lint (UI)
    entry: bash -c 'cd ui && ([ -d node_modules ] || yarn install --frozen-lockfile --ignore-engines) && yarn biome check --write ./src/'
    language: system
    files: ^ui/src/.*\.(ts|tsx|js|jsx|css|json)$
    pass_filenames: false
