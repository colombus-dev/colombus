server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router (HTML5 history API) — serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for versioned static assets
    location ~* \.(js|css|woff2?|svg|gif|png|jpg|jpeg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
