services:
  colombus_ui:
      build: ./ui
      ports:
        - "5173:5173"
      networks:
        - colombus-dev_network
      volumes:
        - ./ui/:/app:rw
        - ui_node_modules:/app/node_modules
      environment:
        VITE_PROXY_TARGET: http://colombus_app:8180
      depends_on:
        - colombus_app
  colombus_app:
    build: .
    ports:
      - "8180:8180"
    networks:
      - colombus-dev_network
    volumes:
      - ./app:/colombus-builder/app:rw
    environment:
      APP_HOST: "http://localhost"
      APP_PORT: 8180
      UI_HOST: "http://localhost"
      UI_PORT: 5173
      DATABASE_URL: postgresql+psycopg://${DB_USERNAME}:${DB_PASSWORD}@colombus_postgresql:5432/${DB_NAME}
      ML_PROFILER_API_URL_PREFIX: ${ML_PROFILER_API_URL_PREFIX}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ALLOWED_GOOGLE_EMAILS: ${ALLOWED_GOOGLE_EMAILS}
      JWT_SECRET: ${JWT_SECRET}
    healthcheck:
      test: curl -f http://localhost:8180/health || exit 1
      interval: 5m
      timeout: 3s
      retries: 3
      start_period: 20s
    depends_on:
      colombus_postgresql:
        condition: service_healthy
  colombus_postgresql:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5433:5432
    networks:
      - colombus-dev_network
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  colombus_pgadmin:
    image: 'dpage/pgadmin4:latest'
    ports:
      - "5051:80"
    networks:
      - colombus-dev_network
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
    depends_on:
      colombus_postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/misc/ping"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - pgadmin

networks:
  colombus-dev_network:
    external: true
    name: colombus-dev_network

volumes:
  postgres_data:
  ui_node_modules:
