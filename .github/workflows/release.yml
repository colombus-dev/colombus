name: Release

on:
  push:
    branches:
      - deployment
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build colombus-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build colombus-ui
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile.prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Push images
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/colombus-app
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}

      - name: Generate tags (ui)
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/colombus-ui
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short
            type=semver,pattern={{version}}

      - name: Push colombus-app
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push colombus-ui
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          file: ./ui/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
