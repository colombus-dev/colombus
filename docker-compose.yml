services:
  colombus_ui:
      build: ./ui
      ports:
        - "5173:5173"
      volumes:
      - ./ui/:/app:rw
      depends_on:
        - colombus_app
  colombus_app:
    build: .
    ports:
      - "8180:8180"
    volumes:
      - ./app:/code/app:rw
    environment:
      POSTGRESQL_FULL_URL: postgresql+psycopg://christopher:pinta@colombus_postgresql:5432/colombusdb
    depends_on:
      colombus_postgresql:
        condition: service_healthy
  colombus_postgresql:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_USER: christopher
      POSTGRES_PASSWORD: pinta
      POSTGRES_DB: colombusdb
    ports:
      - 5433:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "christopher", "-d", "colombusdb"]
      timeout: 10s
      retries: 10
  colombus_pgadmin:
    image: 'dpage/pgadmin4:latest'
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: user@domain.com
      PGADMIN_DEFAULT_PASSWORD: pgpassword
    depends_on:
      colombus_postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - pgadmin