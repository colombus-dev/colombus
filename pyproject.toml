[project]
name = "colombus"
version = "0.1.0"
description = "The Colombus exploration platform"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.116.1",
    "jinja2>=3.1.6",
    "matplotlib>=3.10.6",
    "numpy>=2.3.3",
    "psycopg[binary]>=3.2.10",
    "pydantic>=2.11.7",
    "seaborn>=0.13.2",
    "sqlalchemy>=2.0.43",
    "sqlmodel>=0.0.24",
]

[dependency-groups]
lab = [
    "jupyterlab>=4.4.7",
]
